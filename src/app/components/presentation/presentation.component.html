<div class="bg-neutral-900" id="profile">
  <div class="max-w-5xl mx-auto px-4 xl:px-0 pt-24 lg:pt-32 pb-24">
    <div class="flex flex-col items-center gap-10 md:flex-row md:justify-start">
      <img
        class="rounded"
        data-aos="fade-in"
        src="assets/images/profile/personal-photo.webp"
        alt=""
        width="300"
      />

      <div class="flex flex-col justify-center">
        <h1
          data-aos="fade-in"
          class="text-center md:text-left font-semibold text-[#ff0] text-5xl pb-5 md:text-6xl"
        >
          {{ name }}
        </h1>

        @for (carrer of carrers; track carrer) {
        <h1
          data-aos="fade-in"
          class="text-center md:text-left font-semibold text-white text-4xl md:text-4xl"
        >
          {{ carrer }}
        </h1>
        }
      </div>
    </div>

    <div class="max-w-4xl" data-aos="fade-in">
      <p class="mt-5 text-neutral-400 text-lg">
        {{ presentation }}
      </p>
    </div>

    <div class="hidden mt-5 max-w-4xl space-x-2 space-y-2 sm:block">
      @for (technology of technologies; track $index) {
      <span
        data-aos="fade-in"
        class="inline-flex items-center gap-x-1.5 py-1.5 px-3 rounded-full text-xs font-medium bg-yellow-800/30 text-yellow-500"
        >{{ technology }}</span
      >
      }
    </div>

    <div class="mt-5 max-w-4xl space-x-2 space-y-2 sm:hidden">
      @for (technology of technologiesMobile; track $index) {
      <span
        data-aos="fade-in"
        class="inline-flex items-center gap-x-1.5 py-1.5 px-3 rounded-full text-xs font-medium bg-yellow-800/30 text-yellow-500"
        >{{ technology }}</span
      >
      }
    </div>
  </div>
</div>
